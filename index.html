<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Tiki Arcade">
<meta name="theme-color" content="#241810">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-180.png">
<title>Tiki Arcade</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none;}
  html,body{height:100%;overflow:hidden;overscroll-behavior:none;color:#fff;background:#1b1208;
    font-family:"Trebuchet MS","Segoe UI",system-ui,sans-serif;}
  #app{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;overflow-y:auto;
    padding:calc(env(safe-area-inset-top) + 30px) 20px calc(env(safe-area-inset-bottom) + 20px);
    background:radial-gradient(130% 80% at 50% 0%,#5a4024 0%,#2a1c10 55%,#160e07 100%);}
  .palms{font-size:34px;margin-bottom:2px;}
  .title{font-size:clamp(34px,10vw,48px);font-weight:800;color:#ffd23f;text-align:center;line-height:1.04;
    text-shadow:0 3px 0 #b8500f,0 6px 14px rgba(0,0,0,.5);}
  .sub{margin-top:8px;color:#ffe9c7;opacity:.9;font-size:15px;text-align:center;}
  #grid{width:100%;max-width:460px;margin-top:24px;display:flex;flex-direction:column;gap:14px;}
  .card{display:flex;align-items:center;gap:14px;text-decoration:none;color:#fff;
    background:linear-gradient(180deg,rgba(255,255,255,.13),rgba(255,255,255,.05));
    border:1px solid rgba(255,255,255,.12);border-radius:18px;padding:16px;
    box-shadow:0 6px 16px rgba(0,0,0,.35);transition:transform .08s;}
  .card:active{transform:scale(.97);}
  .card .ic{font-size:40px;width:62px;height:62px;flex:0 0 auto;display:flex;align-items:center;justify-content:center;
    border-radius:14px;background:rgba(0,0,0,.28);box-shadow:inset 0 0 0 1px rgba(255,255,255,.08);}
  .card .tx{flex:1 1 auto;min-width:0;}
  .card .nm{font-size:20px;font-weight:800;}
  .card .tg{font-size:13px;color:#ffe9c7;opacity:.85;margin-top:3px;}
  .card .go{font-size:30px;color:#ffd23f;opacity:.75;font-weight:700;}
  .foot{margin-top:auto;padding-top:22px;text-align:center;color:#ffffff66;font-size:12px;}
</style>
</head>
<body>
<div id="app">
  <div class="palms">🌴🍹🌺</div>
  <div class="title">Tiki Arcade</div>
  <div class="sub">Tap a game to play · works offline</div>
  <div id="grid"></div>
  <div class="foot">Made with love 🌺</div>
</div>
<script>
  const GAMES = [
    { name:'Tiki Merge',      tag:'Merge cocktails into fancier glasses', ic:'🍹', href:'merge/' },
    { name:'Tiki Bar Tycoon', tag:'Build your tropical bar empire',       ic:'🪙', href:'tycoon/' },
  ];
  const grid = document.getElementById('grid');
  for (const g of GAMES){
    const a = document.createElement('a');
    a.className = 'card'; a.href = g.href;
    a.innerHTML = '<div class="ic">'+g.ic+'</div>'+
      '<div class="tx"><div class="nm">'+g.name+'</div><div class="tg">'+g.tag+'</div></div>'+
      '<div class="go">›</div>';
    grid.appendChild(a);
  }
  if ('serviceWorker' in navigator){
    window.addEventListener('load', function(){ navigator.serviceWorker.register('sw.js').catch(function(){}); });
  }
</script>
</body>
</html>
